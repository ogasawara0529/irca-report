<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - iRCA Project</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; background:var(--page-bg); height:100vh; overflow:auto; }
    .login-wrap { width:100%; max-width:400px; padding:24px; }
    .login-box {
      background:var(--white);
      border-radius:14px;
      box-shadow:var(--shadow-lg);
      padding:40px 36px;
    }
    .login-brand {
      display:flex; align-items:center; gap:10px;
      justify-content:center; margin-bottom:28px;
    }
    .login-brand-name { font-size:1.1rem; font-weight:700; color:var(--text-hi); }
    .login-title { font-size:0.82rem; color:var(--muted); text-align:center; margin-bottom:28px; letter-spacing:.05em; }
    .login-group { margin-bottom:16px; }
    .login-label { display:block; font-size:0.75rem; font-weight:600; color:var(--text); margin-bottom:6px; }
    .login-input {
      width:100%; border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; font-size:0.9rem; color:var(--text-hi);
      transition:border-color .15s;
    }
    .login-input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-lt); }
    .login-error { font-size:0.78rem; color:#dc2626; background:#fee2e2; border:1px solid #fca5a5; border-radius:6px; padding:8px 12px; margin-bottom:16px; }
    .login-btn {
      width:100%; background:var(--blue); color:#fff; border:none;
      border-radius:8px; padding:11px; font-size:0.9rem; font-weight:600;
      cursor:pointer; transition:background .15s;
      margin-top:8px;
    }
    .login-btn:hover { background:#2563eb; }
    .login-btn:disabled { background:var(--muted); cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-brand">
        <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
          <path d="M3 2.5A1.5 1.5 0 014.5 1h6.5l4 4v10.5A1.5 1.5 0 0113.5 17h-9A1.5 1.5 0 013 15.5V2.5z" stroke="#3b82f6" stroke-width="1.4" fill="none"/>
          <path d="M11 1v4.5h4" stroke="#3b82f6" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          <line x1="6" y1="8.5"  x2="12" y2="8.5"  stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="11"   x2="12" y2="11"   stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
          <line x1="6" y1="13.5" x2="9.5" y2="13.5" stroke="#3b82f6" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <span class="login-brand-name">iRCA Project</span>
      </div>
      <p class="login-title">週次プロジェクト報告</p>

      <p class="login-error" id="login-error" hidden></p>

      <div class="login-group">
        <label class="login-label" for="username">アカウント</label>
        <input type="text" id="username" class="login-input" autocomplete="username" placeholder="アカウント名を入力">
      </div>
      <div class="login-group">
        <label class="login-label" for="password">パスワード</label>
        <input type="password" id="password" class="login-input" autocomplete="current-password" placeholder="パスワードを入力">
      </div>

      <button class="login-btn" id="login-btn" onclick="doLogin()">ログイン</button>
    </div>
  </div>

  <script>
    async function doLogin() {
      const btn  = document.getElementById('login-btn');
      const err  = document.getElementById('login-error');
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      err.hidden = true;
      btn.disabled = true;
      btn.textContent = 'ログイン中...';

      try {
        const resp = await fetch('/api/login', {
          method:  'POST',
          headers: {'Content-Type': 'application/json'},
          body:    JSON.stringify({ username: user, password: pass }),
        });
        const data = await resp.json();
        if (data.success) {
          location.href = '/';
        } else {
          err.textContent = data.error || 'ログインに失敗しました';
          err.hidden = false;
        }
      } catch (e) {
        err.textContent = '通信エラーが発生しました';
        err.hidden = false;
      } finally {
        btn.disabled = false;
        btn.textContent = 'ログイン';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
